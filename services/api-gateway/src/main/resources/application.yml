server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false  # we define routes explicitly
      routes:
        - id: core-auth
          uri: lb://core
          predicates:
            - Path=/auth/**
        - id: core-actuator
          uri: lb://core
          predicates:
            - Path=/actuator/**
        - id: core-default
          uri: lb://core
          predicates:
            - Path=/**

app:
  jwt:
    signing-secret: ${JWT_SIGNING_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
