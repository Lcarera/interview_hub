# Interview Hub backend configuration
spring:
  application:
    name: interview-hub

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:6543/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: 1
      connection-timeout: 20000
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${APP_BASE_URL:http://localhost:8080}/auth/google/callback
  jwt:
    signing-secret: ${JWT_SIGNING_SECRET}
    expiration-seconds: 3600
  token-encryption-key: ${TOKEN_ENCRYPTION_KEY}
  mail:
    from: ${MAIL_FROM:noreply@gm2dev.com}
  google-service-account:
    key-json: ${GOOGLE_SERVICE_ACCOUNT_KEY:}

logging:
  level:
    com.gm2dev.interview_hub: DEBUG
    org.springframework.security: DEBUG
