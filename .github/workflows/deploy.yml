name: Deploy to GCP

on:
  push:
    branches: [prod]
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Deploy all services (skip change detection)'
        type: boolean
        default: true

env:
  GCP_REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev

jobs:
  # Detect which parts of the codebase changed
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.backend }}
      frontend: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.frontend }}
      infra: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.infra }}
      migrations: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.migrations }}
      eureka: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.eureka }}
      notification: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.notification }}
      gateway: ${{ inputs.force_full_deploy == true && 'true' || steps.filter.outputs.gateway }}
      base_sha: ${{ steps.base.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine comparison base
        id: base
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$EVENT_BEFORE" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.base.outputs.sha }}
          filters: |
            backend:
              - 'services/core/**'
              - 'services/shared/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
            frontend:
              - 'frontend/**'
            infra:
              - 'infra/**'
              - '.github/workflows/deploy.yml'
            migrations:
              - 'supabase/migrations/**'
            eureka:
              - 'services/eureka-server/**'
            notification:
              - 'services/notification-service/**'
              - 'services/shared/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
            gateway:
              - 'services/api-gateway/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'

  deploy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true' || needs.changes.outputs.migrations == 'true' || needs.changes.outputs.eureka == 'true' || needs.changes.outputs.notification == 'true' || needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Install PostgreSQL client
        if: needs.changes.outputs.migrations == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run Supabase migrations
        if: needs.changes.outputs.migrations == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BASE_SHA: ${{ needs.changes.outputs.base_sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set"
            exit 1
          fi
          if [ -z "$BASE_SHA" ]; then
            echo "No base SHA available; skipping migration detection."
            exit 0
          fi
          NEW_FILES=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$CURRENT_SHA" -- 'supabase/migrations/*.sql' | sort)
          if [ -z "$NEW_FILES" ]; then
            echo "No new migration files detected, skipping."
            exit 0
          fi
          echo "New migration files to apply:"
          echo "$NEW_FILES"
          for file in $NEW_FILES; do
            echo "Applying migration: $file"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$file"
          done
          echo "All migrations applied successfully."

      - name: Set up Java 25
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.eureka == 'true' || needs.changes.outputs.notification == 'true' || needs.changes.outputs.gateway == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/backend:${{ github.sha }}
          ./gradlew :services:core:bootBuildImage --imageName=$IMAGE
          docker push $IMAGE

      - name: Build and push eureka image
        if: needs.changes.outputs.eureka == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/eureka-server:${{ github.sha }}
          ./gradlew :services:eureka-server:bootBuildImage --imageName=$IMAGE
          docker push $IMAGE

      - name: Build and push notification image
        if: needs.changes.outputs.notification == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/notification-service:${{ github.sha }}
          ./gradlew :services:notification-service:bootBuildImage --imageName=$IMAGE
          docker push $IMAGE

      - name: Build and push gateway image
        if: needs.changes.outputs.gateway == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/api-gateway:${{ github.sha }}
          ./gradlew :services:api-gateway:bootBuildImage --imageName=$IMAGE
          docker push $IMAGE

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/frontend:${{ github.sha }}
          docker build --build-arg NGINX_CONF=nginx.prod.conf -t $IMAGE ./frontend
          docker push $IMAGE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pulumi dependencies
        run: |
          cd infra
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Deploy with Pulumi
        run: |
          cd infra
          source venv/bin/activate
          pulumi stack select prod
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            pulumi config set interview-hub-infra:backend_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/backend:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-backend \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:backend_image "$CURRENT"
            fi
          fi
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            pulumi config set interview-hub-infra:frontend_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/frontend:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-frontend \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:frontend_image "$CURRENT"
            fi
          fi
          if [ "${{ needs.changes.outputs.eureka }}" == "true" ]; then
            pulumi config set interview-hub-infra:eureka_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/eureka-server:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-eureka-server \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:eureka_image "$CURRENT"
            fi
          fi
          if [ "${{ needs.changes.outputs.notification }}" == "true" ]; then
            pulumi config set interview-hub-infra:notification_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/notification-service:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-notification \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:notification_image "$CURRENT"
            fi
          fi
          if [ "${{ needs.changes.outputs.gateway }}" == "true" ]; then
            pulumi config set interview-hub-infra:gateway_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/api-gateway:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-api-gateway \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:gateway_image "$CURRENT"
            fi
          fi
          pulumi up --yes
