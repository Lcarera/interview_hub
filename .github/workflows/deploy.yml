name: Deploy to GCP

on:
  push:
    branches: [prod]

env:
  GCP_REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev

jobs:
  # Detect which parts of the codebase changed
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
            frontend:
              - 'frontend/**'
            infra:
              - 'infra/**'
              - '.github/workflows/deploy.yml'

  deploy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Java 25
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/backend:${{ github.sha }}
          ./gradlew bootBuildImage --imageName=$IMAGE
          docker push $IMAGE

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/frontend:${{ github.sha }}
          docker build --build-arg NGINX_CONF=nginx.prod.conf -t $IMAGE ./frontend
          docker push $IMAGE

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pulumi dependencies
        run: |
          cd infra
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Deploy with Pulumi
        run: |
          cd infra
          source venv/bin/activate
          pulumi stack select prod
          if [ "${{ needs.changes.outputs.backend }}" == "true" ]; then
            pulumi config set interview-hub-infra:backend_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/backend:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-backend \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:backend_image "$CURRENT"
            fi
          fi
          if [ "${{ needs.changes.outputs.frontend }}" == "true" ]; then
            pulumi config set interview-hub-infra:frontend_image \
              ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/interview-hub/frontend:${{ github.sha }}
          else
            CURRENT=$(gcloud run services describe interview-hub-frontend \
              --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
            if [ -n "$CURRENT" ]; then
              pulumi config set interview-hub-infra:frontend_image "$CURRENT"
            fi
          fi
          pulumi up --yes
